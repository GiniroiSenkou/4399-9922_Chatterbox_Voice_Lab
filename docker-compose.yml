services:
  nginx:
    image: nginx:alpine
    ports:
      - "${PORT:-8080}:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - frontend
      - backend
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      target: prod
    expose:
      - "80"
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      target: prod
    expose:
      - "8000"
    volumes:
      - ./data:/app/data
    environment:
      - DATABASE_URL=${DATABASE_URL:-sqlite+aiosqlite:////app/data/db/voicelab.db}
      - STORAGE_ROOT=${STORAGE_ROOT:-/app/data}
      - DEVICE=${DEVICE:-cpu}
      - DEFAULT_MODEL=${DEFAULT_MODEL:-turbo}
      - MAX_LOADED_MODELS=${MAX_LOADED_MODELS:-1}
      - HF_HOME=${HF_HOME:-/app/data/models}
      - MAX_UPLOAD_SIZE_MB=${MAX_UPLOAD_SIZE_MB:-50}
      - MAX_VOICE_DURATION_S=${MAX_VOICE_DURATION_S:-60}
      - MIN_VOICE_DURATION_S=${MIN_VOICE_DURATION_S:-5}
      - CORS_ORIGINS=${CORS_ORIGINS:-["http://localhost:8080"]}
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    restart: no
